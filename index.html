<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Manpasand Footwear</title>

    <style>

        /* Buy Now Button Styling */
.product-card button {
    background-color: #27ae60; /* Hara color */
    color: white;
    border: none;
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.3s ease, transform 0.2s;
}

/* Button par mouse le jane par effect */
.product-card button:hover {
    background-color: #219150;
    transform: scale(1.05); /* Button thoda bada hoga */
}

/* Button dabane par effect */
.product-card button:active {
    transform: scale(0.98);
}
    </style>
</head>
<body>

    <header class="header1">
        <img src="manpasand.png" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="manpasand footwear collection.html">Collection</a></li>
                <li><a href="manpasand footwear contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" placeholder="Search for Shoes..." id="search-input">
            <button type="submit">Search</button>
        </div>
    </header>

   <section class="banner">
    <h1>Welcome to Manpasand Footwear</h1>
    <p>Best quality footwear at best prices!</p>
    
    <a href="manpasand footwear collection.html" class="shop-now-btn">Shop Now</a>
</section>

    <div class="category-filter">
        <button onclick="filterCategory('all')"><i class="fas fa-th-large"></i> All</button>
        <button onclick="filterCategory('men')"><i class="fas fa-male"></i> Men</button>
        <button onclick="filterCategory('women')"><i class="fas fa-female"></i> Women</button>

        <button onclick="filterCategory('shoes')"><i class="fas fa-running"></i> Shoes</button>
        <button onclick="filterCategory('child')"><i class="fas fa-child"></i> Child </button>
        <button onclick="filterCategory('chapple')"><i class="fas fa-child"></i> Chapple </button>
        
        
    </div>

    <main class="product-container" id="product-list">
  
        </main>
</div>


       
        
       
 </main>


<div id="orderModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeOrderModal()">&times;</span>
        <h3>Order Details</h3>
        <input type="text" id="custName" placeholder="Aapka Naam">
        <input type="email" id="custEmail" placeholder="Email Address">
        <input type="tel" id="custMobile" placeholder="Mobile Number">
        <textarea id="custAddress" placeholder="Delivery Address"></textarea>
        <select id="paymentMethod">
            <option value="Cash on Delivery">Cash on Delivery</option>
            <option value="UPI">UPI</option>
        </select>
       <button class="confirm-btn" onclick="confirmOrder(event)">Order Confirm Karein</button>
    </div>
</div>
    
    <script>
       
       function filterCategory(category) {
    const products = document.getElementsByClassName('product-card');
    for (let i = 0; i < products.length; i++) {
        const productCategory = products[i].getAttribute('data-category');
        
        // logic sahi hai
        if (category === 'all' || (productCategory && productCategory.includes(category))) {
            products[i].style.display = ""; 
        } else {
            products[i].style.display = "none";
        }
    }
}

// SEARCH INPUT WALA CODE YAHAN HAI - ISSE UPDATE KAREIN
const searchInput = document.getElementById('search-input');
const products = document.getElementsByClassName('product-card');

// Sirf tabhi run hoga agar 'search-input' page par exist karta hai
if (searchInput) {
    searchInput.addEventListener('keyup', function() {
        const filter = searchInput.value.toLowerCase();
        for (let i = 0; i < products.length; i++) {
            let title = products[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
            products[i].style.display = title.indexOf(filter) > -1 ? "" : "none";
        }
    });
}

// --- Modal Functionality Start ---

// Global variables
let selectedProductName = "";
let selectedProductPrice = "";

// 1. Popup open karne ke liye
function openOrderModal() {
    document.getElementById('orderModal').style.display = 'block';
}

// 2. Popup band karne ke liye
function closeOrderModal() {
    document.getElementById('orderModal').style.display = 'none';
}

// 3. Product details uthane ke liye
function autoOpenForm(buttonElement) {
    let card = buttonElement.closest('.product-card');
    window.selectedProductName = card.querySelector('.product-title').innerText;
    window.selectedProductPrice = card.querySelector('.product-info strong').innerText;
    
    // .value ki jagah .innerText ka use karein
    window.currentSize = card.querySelector('.product-size').innerText; 
    window.currentQty = card.querySelector('.product-qty').innerText;
    
    openOrderModal();
}

// 4. WhatsApp par bhejne ke liye (Button isi ko call karega)
function confirmOrder(event) {
    event.preventDefault(); 

    // Form se values lena
    const name = document.getElementById('custName').value;
    const email = document.getElementById('custEmail').value;
    const phone = document.getElementById('custMobile').value;
    const address = document.getElementById('custAddress').value;
    const payment = document.getElementById('paymentMethod').value;
    
    const whatsappNumber = "917575837074"; 

    // Message yahan se generate hoga
    const message = `🛍️ New Order Received! 🛍️

👤 Customer Details:
* Name: ${name}
* Email: ${email}
* Mobile: ${phone}
* Address: ${address}
* Payment Mode: ${payment}

👕 Product Details:
* Item Name: ${window.selectedProductName || 'N/A'}
* Price: ${window.selectedProductPrice || 'N/A'}
* Size: ${window.currentSize || 'N/A'}
* Quantity: ${window.currentQty || 'N/A'}`;

    const url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>

    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    // Yahan apni sahi keys daalein (Project Settings se copy karke)
    const firebaseConfig = {
  apiKey: "AIzaSyDUHPF2bo6_inWIY4hiHEwNg3rVQq_D2Ew",
  authDomain: "v-fashion-hub-b7419.firebaseapp.com",
  projectId: "v-fashion-hub-b7419",
  storageBucket: "v-fashion-hub-b7419.firebasestorage.app",
  messagingSenderId: "826405117227",
  appId: "1:826405117227:web:f8497f3c11fbee991f396e"
};


  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadProducts() {
    const productList = document.getElementById('product-list');
    productList.innerHTML = "Loading..."; // Feedback ke liye

    const querySnapshot = await getDocs(collection(db, "products"));
    productList.innerHTML = ""; // Loading hatayein

   // Apni script mein ye badlav karein
querySnapshot.forEach((doc) => {
  const product = doc.data(); 
  
  // Yahan naye fields add karein
 // index.html mein jab innerHTML set kar rahe ho:
productList.innerHTML += `
    <div class="product-card" data-category="${product.category}">
        <img src="${product.imageUrl}" alt="${product.name}" style="width:100%; height:auto;">
      <h3 class="product-title">${product.name}</h3>
      <p class="product-info">Price: <strong>${product.price}</strong></p>
      <p>Size: <span class="product-size">${product.pSize || 'N/A'}</span></p>
      <p>Qty: <span class="product-qty">${product.pquantity || 'N/A'}</span></p>
      <button onclick="autoOpenForm(this)">Buy Now</button>
    </div>
`;
});
  }

  loadProducts();
</script>
</body>
</html>
